<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" th:href="@{/css/regstyles.css}">
</head>
<body>

    <!-- 🔥 NAVBAR -->
    <header>
        <nav class="navbar">
            <div class="logo"> <a th:href="@{/}">AlphaCoder</a> </div>
            <ul class="nav-links">
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/about}">About</a></li>
                <li><a th:href="@{/services}">Services</a></li>
                <li><a th:href="@{/contact}">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- FORM -->
    <main>
        <div class="form-container">
            <h1>Register</h1>

            <!-- 🔥 IMPORTANT FIX -->
            <form th:action="@{/register}" method="post">

                <label>Name:</label>
                <input type="text" name="name" required>

                <label>Email:</label>
                <input type="email" name="email" required>

                <button type="submit">Register</button>
            </form>

            <a th:href="@{/}">← Back to Home</a>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span> AlphaCoder Academy. All rights reserved.</p>
    </footer>



</body>
</html>
